<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bodega de Café — Gestión</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- ============== VISTA LOGIN ============== -->
  <div id="login-view" class="auth-screen">
    <form id="login-form" class="auth-card">
      <div class="brand-lg">☕</div>
      <h1>Bodega de Café</h1>
      <p class="muted">Inicia sesión para continuar</p>

      <label>
        <span>Usuario</span>
        <input name="username" type="text" autocomplete="username" required placeholder="admin" />
      </label>

      <label>
        <span>Contraseña</span>
        <input name="password" type="password" autocomplete="current-password" required placeholder="Admin123!" />
      </label>

      <button type="submit" class="btn btn-primary btn-block">Entrar</button>

      <p id="login-error" class="error-msg" role="alert"></p>

      <p class="muted small">
        URL de la API: <code id="api-base-label"></code>
      </p>
    </form>
  </div>

  <!-- ============== APP PRINCIPAL ============== -->
  <div id="app-view" class="app hidden">
    <aside class="sidebar">
      <div class="brand">☕ Bodega</div>
      <nav class="nav">
        <button class="nav-item" data-view="clientes">👥 Clientes</button>
        <button class="nav-item" data-view="tipos">🌱 Tipos de Café</button>
        <button class="nav-item" data-view="inventario">📦 Inventario</button>
        <button class="nav-item" data-view="entradas">⬇️ Entradas</button>
        <button class="nav-item" data-view="salidas">⬆️ Salidas</button>
      </nav>
      <div class="user-box">
        <div>
          <small class="muted">Conectado como</small>
          <div id="user-name" class="user-name">—</div>
        </div>
        <button id="logout-btn" class="btn btn-ghost btn-sm">Salir</button>
      </div>
    </aside>

    <main class="content">
      <header class="topbar">
        <button id="menu-btn" class="btn btn-ghost btn-icon" aria-label="Menú">☰</button>
        <h2 id="view-title">Clientes</h2>
      </header>

      <section class="view" id="view-clientes" hidden></section>
      <section class="view" id="view-tipos" hidden></section>
      <section class="view" id="view-inventario" hidden></section>
      <section class="view" id="view-entradas" hidden></section>
      <section class="view" id="view-salidas" hidden></section>
    </main>
  </div>

  <!-- ============== MODAL ============== -->
  <div id="modal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card" role="dialog" aria-modal="true">
      <header class="modal-header">
        <h3 class="modal-title">Título</h3>
        <button class="modal-close btn btn-ghost btn-icon" data-close aria-label="Cerrar">×</button>
      </header>
      <div class="modal-body"></div>
    </div>
  </div>

  <!-- ============== TOASTS ============== -->
  <div id="toasts" class="toasts" aria-live="polite"></div>

  <!-- ============== LOADER ============== -->
  <div id="loader" class="loader hidden" aria-hidden="true">
    <div class="spinner"></div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
